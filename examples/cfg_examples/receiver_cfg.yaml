buffer_size: 1024

bind_host: "0.0.0.0"

bind_port: 9000

max_connections: 1



# When true, accepted TCP connections are upgraded with TLS and the client must

# present a certificate signed by the CA in ca_cert_path. Paths are PEM files;

# defaults below match mavc-local-ca / local_ca_cfg.yaml layout (relative to cwd).

verify_client_identity: false

server_cert_path: "ca/certs/server.cert.pem"

server_key_path: "ca/private/server.key.pem"

ca_cert_path: "ca/certs/ca.cert.pem"

